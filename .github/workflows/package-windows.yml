name: package-windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Package
        shell: pwsh
        run: ./scripts/package-windows.ps1

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: AncientValueOverlay-win-x64
          path: artifacts/AncientValueOverlay-win-x64.zip
          if-no-files-found: error
