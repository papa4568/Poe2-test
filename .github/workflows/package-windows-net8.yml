name: package-windows-net8

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Package
        shell: pwsh
        run: ./scripts/package-windows.ps1
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: AncientValueOverlay-win-x64
          path: artifacts/AncientValueOverlay-win-x64.zip
